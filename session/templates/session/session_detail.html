<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Session {{ session.id }}</title>
    <style>
        :root {
            color-scheme: light;
            --page-bg: linear-gradient(180deg, #f3f7f4 0%, #edf1ec 100%);
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-border: rgba(27, 49, 34, 0.12);
            --text-main: #17301f;
            --text-muted: #607261;
            --accent: #2f7d4a;
            --accent-soft: rgba(47, 125, 74, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: var(--page-bg);
            color: var(--text-main);
        }

        main {
            width: min(920px, calc(100% - 32px));
            margin: 48px auto;
        }

        .hero {
            margin-bottom: 24px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font: 600 0.8rem/1.2 Arial, sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            line-height: 0.95;
        }

        .subtitle {
            max-width: 56ch;
            margin: 0;
            color: var(--text-muted);
            font: 400 1rem/1.6 Arial, sans-serif;
        }

        .card {
            padding: 28px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel-bg);
            box-shadow: 0 24px 60px rgba(34, 57, 42, 0.08);
            backdrop-filter: blur(12px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
        }

        .item {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(27, 49, 34, 0.08);
        }

        dt {
            margin: 0 0 8px;
            color: var(--text-muted);
            font: 600 0.85rem/1.3 Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        dd {
            margin: 0;
            word-break: break-word;
            font-size: 1.05rem;
            line-height: 1.45;
        }

        @media (max-width: 640px) {
            main {
                margin: 24px auto;
            }

            .card {
                padding: 20px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="hero">
        <span class="eyebrow">Session Detail</span>
        <h1>{{ session.shop }}</h1>
        <p class="subtitle">
            Vista de detalle del modelo <strong>Session</strong>. Los tokens se muestran
            parcialmente ocultos para evitar exponer secretos completos en pantalla.
        </p>
    </section>

    <section class="card">
        <dl class="grid">
            {% for label, value in detail_rows %}
                <div class="item">
                    <dt>{{ label }}</dt>
                    <dd>{{ value }}</dd>
                </div>
            {% endfor %}
        </dl>
    </section>
</main>
</body>
</html>
